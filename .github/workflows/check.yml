name: iDATA Appointment Checker

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # Kill if it hangs (keeps under the 10-min window)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run checker
        env:
          IDATA_MEMBERSHIP_NO: ${{ secrets.IDATA_MEMBERSHIP_NO }}
          IDATA_EMAIL:         ${{ secrets.IDATA_EMAIL }}
          IDATA_PASSWORD:      ${{ secrets.IDATA_PASSWORD }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          WHATSAPP_PHONE:      ${{ secrets.WHATSAPP_PHONE }}
          CALLMEBOT_APIKEY:    ${{ secrets.CALLMEBOT_APIKEY }}
          OTP_WAIT_SECONDS:    "90"
        run: python checker.py
